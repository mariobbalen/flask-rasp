<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <style>
    body { font-family: sans-serif; display: grid; place-items: center; min-height: 100vh; margin: 0; background: #f4f4f4; }
    form { background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); width: 280px; }
    h2   { margin: 0 0 20px; font-size: 20px; }
    label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }
    input { width: 100%; padding: 8px 10px; margin-bottom: 14px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    button { width: 100%; padding: 9px; background: #4f46e5; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
    button:hover { background: #4338ca; }
    .error { color: #c0392b; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <form method="POST" action="/login">
    <h2>Login</h2>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <label for="username">Username</label>
    <input type="text" id="username" name="username" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>

    <button type="submit">Sign in</button>
  </form>
</body>
</html>
